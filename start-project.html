<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Start a Project | RU Dev</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
  body {
    background: radial-gradient(circle at top, #1e293b, #020617);
  }
</style>
</head>

<body class="text-slate-100">

<!-- HEADER -->
<header class="max-w-7xl mx-auto px-6 py-6 flex justify-between items-center">
  <a href="index.html" class="text-2xl font-bold">RU Dev</a>
  <a href="index.html" class="text-slate-300 hover:text-white">← Back to Home</a>
</header>

<!-- FORM SECTION -->
<section class="max-w-3xl mx-auto px-6 py-24">

  <div class="bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl p-12">

    <h1 class="text-4xl font-bold mb-6 text-center">
      Start Your Project
    </h1>

    <p class="text-slate-300 text-center mb-10">
      Share your idea and we’ll contact you shortly.
    </p>

    <!-- ✅ NETLIFY FORM -->
    <form 
      name="start-project"
      method="POST"
      data-netlify="true"
      netlify-honeypot="bot-field"
      class="space-y-6"
    >

      <!-- REQUIRED FOR NETLIFY -->
      <input type="hidden" name="form-name" value="start-project">

      <!-- HONEYPOT -->
      <p class="hidden">
        <label>Don’t fill this out <input name="bot-field"></label>
      </p>

      <input
        type="text"
        name="name"
        placeholder="Your Name"
        required
        class="w-full px-5 py-4 rounded-xl bg-black/30 border border-white/20 text-white outline-none">

      <input
        type="email"
        name="email"
        placeholder="Email Address"
        required
        class="w-full px-5 py-4 rounded-xl bg-black/30 border border-white/20 text-white outline-none">

      <select
        name="project_type"
        required
        class="w-full px-5 py-4 rounded-xl bg-black/30 border border-white/20 text-white outline-none">
        <option value="">Select Project Type</option>
        <option>Android App</option>
        <option>Windows Software</option>
        <option>Website</option>
        <option>Other</option>
      </select>

      <textarea
        name="message"
        rows="5"
        placeholder="Describe your project"
        required
        class="w-full px-5 py-4 rounded-xl bg-black/30 border border-white/20 text-white outline-none"></textarea>

      <button
        type="submit"
        class="w-full py-4 rounded-xl bg-blue-500 hover:bg-blue-600 font-semibold transition">
        Submit Project
      </button>

    </form>

    <div class="text-center mt-10 text-slate-300">
      📧 contact@rudev.com <br>
      📱 WhatsApp: +91-XXXXXXXXXX
    </div>

  </div>
</section>

<!-- FOOTER -->
<footer class="border-t border-white/10 py-8 text-center text-slate-400">
  © 2026 RU Dev — Start a Project
</footer>

</body>
</html>
